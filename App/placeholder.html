<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OU Hiking Club | Placeholder</title>
    <link rel="stylesheet" href="style.css">
	<link rel="preload" as="image" href="./imgs/header.jpg" type="image/jpeg">
</head>
<body>
    <header>
        <div class="user-info">
            <span>Username</span>
            <button type="button" aria-label="Sign in or log out">Sign in / Log out</button>
        </div>
        <button type="button" id="mobile-nav" aria-label="Navigation">☰</button>
        <div class="header-title">
            <h1>OU Hiking Club</h1>
            <h2>Administrators</h2>
        </div>
        <button type="button" id="options" aria-label="Options">⋮</button>
    </header>

    <nav>
        <a href="index.html">Hike events</a>
        <a href="social_events.html">Social events</a>
        <a href="members.html">Members</a>
        <a href="news.html">News</a>
    </nav>

	<main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
		<h1 style="font-size: 3rem; color: #2c4a2c; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center;">
			<span>Coming Soon</span>
			<span style="margin-top: 0.25rem;">🔨</span>
		</h1>
		<button class="action-btn" style="width: auto; padding: 0.75rem 2rem;" onclick="history.back()">Go back</button>
	</main>

    <script>
        // Mobile Navigation
        const mobileNavBtn = document.getElementById('mobile-nav');
        const navMenu = document.querySelector('nav');
        function toggleMobileNav() {
            if (!navMenu) return;
            navMenu.classList.toggle('show');
            if (navMenu.classList.contains('show')) {
                navMenu.style.display = 'flex';
                navMenu.style.flexDirection = 'column';
                navMenu.style.alignItems = 'center';
            } else {
                navMenu.style.display = '';
            }
        }
        if (mobileNavBtn && navMenu) {
            mobileNavBtn.addEventListener('click', toggleMobileNav);
            const navLinks = navMenu.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        navMenu.classList.remove('show');
                        navMenu.style.display = '';
                    }
                });
            });
        }
    </script>
</body>
</html>
