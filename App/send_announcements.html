<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="stylesheet" href="style.css" />
	<link rel="preload" as="image" href="./imgs/header.jpg" type="image/jpeg">
    <title>OU Hiking Club - Send announcement</title>
</head>
<body>
    <header>
        <div class="user-info">
            <span>Username</span>
            <button type="button" aria-label="Sign in or log out">Sign in / Log out</button>
        </div>
        <button type="button" id="mobile-nav" aria-label="Navigation">☰</button>
        <div class="header-title">
            <h1>OU Hiking Club</h1>
            <h2>Administrators</h2>
        </div>
        <button type="button" id="options" aria-label="Options">⋮</button>
    </header>

    <nav>
        <a href="index.html">Hike events</a>
        <a href="social_events.html">Social events</a>
        <a href="members.html">Members</a>
        <a href="news.html">News</a>
    </nav>

    <main>
        <h3 class="forms-heading">Send announcement</h3>
        <form action="https://students.open.ac.uk/mct/tt284/reflect/reflect.php" method="post" enctype="multipart/form-data">
            <input type="hidden" name="SessionIdentifier" value="db34-af22-bcda6836-8070"/>
            <div class="form-columns">
                <div class="column">
                    <div class="small-field">
                        <label for="sender">Sender</label>
                        <input type="text" id="sender" name="sender" />
                    </div>
                    <div class="small-field">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" />
                    </div>
                    <div class="small-field">
                        <label for="attachment">Attachment</label>
                        <input type="file" id="attachment" name="attachment" />
                    </div>
                </div>
                <div class="column">
                    <div class="small-field">
                        <label for="sending-time">Sending time</label>
                        <input type="time" id="sending-time" name="sending-time" />
                    </div>
                    <div class="small-field">
                        <label for="sending-date">Sending date</label>
                        <input type="date" id="sending-date" name="sending-date" />
                    </div>
                    <div class="small-field">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority">
                            <option value="low">Low</option>
                            <option value="normal" selected>Normal</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="full-field">
                <label for="announcement">Announcement</label>
                <textarea id="announcement" name="announcement" maxlength="200"></textarea>
            </div>
            <div class="buttons">
                <button type="submit">Submit</button>
                <button type="reset" onclick="window.location.href='./members.html'">Cancel</button>
            </div>
        </form>
    </main>

    <script>
        // Mobile Navigation Toggle
        const mobileNavBtn = document.getElementById('mobile-nav');
        const navMenu = document.querySelector('nav');

        function toggleMobileNav() {
            if (!navMenu) return;
            navMenu.classList.toggle('show');
            if (navMenu.classList.contains('show')) {
                navMenu.style.display = 'flex';
                navMenu.style.flexDirection = 'column';
                navMenu.style.alignItems = 'center';
            } else {
                navMenu.style.display = '';
            }
        }

        if (mobileNavBtn && navMenu) {
            mobileNavBtn.addEventListener('click', toggleMobileNav);
            const navLinks = navMenu.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        navMenu.classList.remove('show');
                        navMenu.style.display = '';
                    }
                });
            });
        }
    </script>
</body>
</html>
